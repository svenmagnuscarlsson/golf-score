<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Backa Säteri SCORE</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
</head>

<body>
    <div id="app" class="app-container">
        <!-- HEADER -->
        <header class="app-header">
            <h1 id="header-title">Backa Säteri</h1>
            <div style="display: flex; gap: 8px;">
                <button id="btn-slope-toggle" class="icon-btn"><span
                        class="material-symbols-rounded">table_chart</span></button>
                <button id="btn-history-toggle" class="icon-btn"><span
                        class="material-symbols-rounded">history</span></button>
            </div>
        </header>

        <!-- VIEWS CONTAINER -->
        <main class="views-container">

            <!-- START VIEW -->
            <section id="view-start" class="view active">
                <div class="glass-card">
                    <h2>Ny Runda</h2>
                    <div class="players-setup">
                        <h3>Spelare</h3>
                        <ul id="setup-players-list" class="players-list">
                            <!-- Players injected here -->
                        </ul>
                        <div class="add-player-form">
                            <input type="text" id="input-player-name" placeholder="Namn">
                            <input type="number" id="input-player-shcp" placeholder="SpelHCP">
                            <button id="btn-add-player" class="btn secondary">Lägg till</button>
                        </div>
                    </div>
                    <button id="btn-start-round" class="btn primary lg">Starta Runda</button>
                </div>

            </section>

            <!-- SLOPE VIEW -->
            <section id="view-slope" class="view">
                <div class="glass-card">
                    <h2>Slopetabell</h2>
                    <img src="images/slopetabell.png" alt="Slopetabell" class="slope-img" id="img-slope">
                    <button id="btn-back-from-slope" class="btn secondary mt-4">Tillbaka</button>
                </div>
            </section>

            <!-- HOLE VIEW -->
            <section id="view-hole" class="view">
                <div class="hole-header">
                    <button id="btn-prev-hole" class="icon-btn"><span
                            class="material-symbols-rounded">chevron_left</span></button>
                    <div class="hole-info-display">
                        <h2 id="current-hole-number">Hål 1</h2>
                        <span class="hole-stats">Par <span id="current-hole-par">4</span> • Index <span
                                id="current-hole-index">3</span></span>
                    </div>
                    <button id="btn-next-hole" class="icon-btn"><span
                            class="material-symbols-rounded">chevron_right</span></button>
                </div>

                <div class="view-toggle-container"
                    style="display: flex; justify-content: center; gap: 10px; margin-bottom: 10px;">
                    <button id="btn-show-image" class="btn secondary" style="flex: 1; padding: 8px;">Banguide</button>
                    <button id="btn-show-map" class="btn outline" style="flex: 1; padding: 8px;">Karta & GPS</button>
                </div>

                <div class="hole-media-container">
                    <div id="hole-image-wrapper" class="hole-image-container">
                        <img id="current-hole-img" src="images/hal-1.png" alt="Banguide hål 1">
                    </div>

                    <div id="hole-map-wrapper" class="hole-map-container hidden">
                        <div id="map" style="width: 100%; height: 100%;"></div>
                        <div
                            style="position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 90%; display: flex; gap: 8px;">
                            <button id="btn-fetch-gps" class="btn secondary"
                                style="flex: 1; padding: 10px; font-size: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.5);">📍
                                Hämta GPS</button>
                            <button id="btn-save-gps" class="btn primary"
                                style="flex: 1; padding: 10px; font-size: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.5);">💾
                                Spara position</button>
                        </div>
                    </div>
                </div>

                <div class="players-scoring">
                    <ul id="scoring-players-list" class="scoring-list">
                        <!-- Scoring rows injected here -->
                    </ul>
                </div>
                <div class="hole-actions">
                    <button id="btn-finish-round" class="btn outline hidden">Avsluta Runda & Visa Scorekort</button>
                </div>
            </section>

            <!-- SCORECARD VIEW -->
            <section id="view-scorecard" class="view">
                <div class="glass-card">
                    <h2>Scorekort</h2>
                    <div class="scorecard-container">
                        <table id="scorecard-table">
                            <thead>
                                <tr>
                                    <th>Hål</th>
                                    <!-- Player names injected here -->
                                </tr>
                            </thead>
                            <tbody id="scorecard-tbody">
                                <!-- Scores injected here -->
                            </tbody>
                            <tfoot id="scorecard-tfoot">
                                <!-- Totals injected here -->
                            </tfoot>
                        </table>
                    </div>
                    <div class="card-actions">
                        <button id="btn-save-round" class="btn primary">Spara Runda</button>
                        <button id="btn-discard-round" class="btn text-btn">Kasta Runda</button>
                    </div>
                </div>
            </section>

            <!-- HISTORY VIEW -->
            <section id="view-history" class="view">
                <div class="glass-card">
                    <h2>Historik</h2>
                    <ul id="history-list" class="history-list">
                        <!-- Past rounds injected here -->
                    </ul>
                    <button id="btn-back-to-start" class="btn secondary mt-4">Tillbaka</button>
                </div>
            </section>

        </main>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="js/db.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
